<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OE Team Dashboard</title>
<style>
  :root{
    --bg:#f0f4f8;--panel:#fff;--panel-2:#e8edf2;--line:#d1dae3;
    --text:#1a2332;--muted:#6b7e93;--accent:#0ea5a0;--accent-soft:rgba(14,165,160,0.10);
    --warn:#d97706;--warn-bg:rgba(217,119,6,0.10);
    --bad:#dc2626;--bad-bg:rgba(220,38,38,0.10);
    --good:#16a34a;--good-bg:rgba(22,163,74,0.10);
    --off:#6b7e93;--off-bg:rgba(107,126,147,0.10);
    --radius:10px;
  }
  body.dark{
    --bg:#0f1419;--panel:#161d27;--panel-2:#1c2531;--line:#2a3441;
    --text:#e7edf3;--muted:#8b9bab;--accent:#4fd1c5;--accent-soft:rgba(79,209,197,0.12);
    --warn:#f2b84b;--warn-bg:rgba(242,184,75,0.12);
    --bad:#f0625a;--bad-bg:rgba(240,98,90,0.12);
    --good:#4fd17a;--good-bg:rgba(79,209,122,0.12);
    --off:#8b9bab;--off-bg:rgba(139,155,171,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}

  /* Login */
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
  .login-box{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:32px;width:320px;display:flex;flex-direction:column;gap:12px;}
  .login-box h1{font-size:18px;font-weight:700;}
  .login-box .sub{color:var(--muted);font-size:12px;}
  .login-box input{background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:8px;font-size:13px;outline:none;}
  .login-box input:focus{border-color:var(--accent);}
  .sign-in-btn{background:var(--accent);color:#fff;border:none;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
  #loginError{color:var(--bad);font-size:12px;min-height:14px;}

  /* Layout */
  header{padding:16px 28px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  header h1{font-size:18px;font-weight:700;}
  header .sub{color:var(--muted);font-size:12px;margin-top:2px;}
  .right-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .pill{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);}
  .pill.live{color:var(--good);}
  .pill.err{color:var(--bad);}
  .icon-btn{background:none;border:1px solid var(--line);color:var(--muted);padding:4px 10px;border-radius:8px;font-size:12px;cursor:pointer;}
  .icon-btn:hover{color:var(--text);}
  .theme-btn{background:var(--panel-2);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--muted);}

  /* Day bar */
  .day-bar{padding:14px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .day-bar .today{font-size:15px;font-weight:700;}
  .day-bar .date-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .summary-pills{display:flex;gap:10px;flex-wrap:wrap;}
  .sum-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--line);background:var(--panel);}
  .sum-pill.on{color:var(--good);border-color:rgba(22,163,74,0.3);background:var(--good-bg);}
  .sum-pill.off{color:var(--off);border-color:rgba(107,126,147,0.3);background:var(--off-bg);}
  .sum-pill.alert{color:var(--bad);border-color:rgba(220,38,38,0.3);background:var(--bad-bg);}
  .sum-pill.warn{color:var(--warn);border-color:rgba(217,119,6,0.3);background:var(--warn-bg);}

  /* Tabs */
  .tabs{display:flex;gap:0;padding:0 28px;border-bottom:1px solid var(--line);}
  .tab{padding:12px 18px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}

  /* Controls */
  .controls{display:flex;gap:10px;padding:14px 28px;flex-wrap:wrap;align-items:center;}
  .controls input,.controls select{background:var(--panel);border:1px solid var(--line);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;outline:none;min-width:160px;}
  .controls input{flex:1;}
  .controls input:focus,.controls select:focus{border-color:var(--accent);}
  .add-btn{background:var(--accent-soft);color:var(--accent);border:1px solid rgba(14,165,160,0.35);padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;white-space:nowrap;}

  /* Grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:16px 28px 40px;}

  /* Member card */
  .member-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .card-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;}
  .card-header .name{font-size:15px;font-weight:700;}
  .card-header .role{font-size:11px;color:var(--muted);margin-top:2px;}
  .shift-chip{font-size:11px;padding:4px 10px;border-radius:20px;white-space:nowrap;font-weight:600;}
  .shift-chip.on-shift{background:var(--good-bg);color:var(--good);border:1px solid rgba(22,163,74,0.3);}
  .shift-chip.off-today{background:var(--off-bg);color:var(--off);border:1px solid rgba(107,126,147,0.3);}

  /* Supplier cut-off section */
  .card-section{padding:0 16px 14px;}
  .section-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;padding-top:12px;border-top:1px solid var(--line);}
  .supplier-row{display:flex;align-items:center;justify-content:space-between;border-radius:8px;padding:8px 12px;margin-bottom:6px;border:1px solid var(--line);background:var(--panel-2);}
  .supplier-row.ok{border-color:rgba(22,163,74,0.4);background:var(--good-bg);}
  .supplier-row.warn{border-color:rgba(217,119,6,0.5);background:var(--warn-bg);}
  .supplier-row.bad{border-color:rgba(220,38,38,0.5);background:var(--bad-bg);}
  .sup-name{font-size:13px;font-weight:600;}
  .cutoff-row{display:flex;align-items:center;gap:5px;margin-top:3px;}
  .cutoff-label{font-size:10px;color:var(--muted);}
  .cutoff-input{font-size:11px;background:transparent;border:none;border-bottom:1px dashed var(--line);color:var(--text);outline:none;width:72px;}
  .cutoff-input:focus{border-bottom-color:var(--accent);}
  .time-info{text-align:right;flex-shrink:0;}
  .status-icon{font-size:16px;}
  .time-left{font-size:10px;font-weight:600;}
  .time-left.ok{color:var(--good);}
  .time-left.warn{color:var(--warn);}
  .time-left.bad{color:var(--bad);}

  /* Task breakdown */
  .task-list{display:flex;flex-direction:column;gap:4px;}
  .task-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;background:var(--panel-2);}
  .task-row.is-break{opacity:0.5;}
  .task-time{font-size:10px;color:var(--muted);white-space:nowrap;min-width:90px;}
  .task-name{font-size:12px;font-weight:500;}

  /* Weekly roster */
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .day-cell{padding:6px 4px;border-radius:6px;text-align:center;background:var(--panel-2);}
  .day-cell .day-name{font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:3px;}
  .day-cell .day-shift{font-size:9px;font-weight:600;line-height:1.3;}
  .day-cell.is-off{opacity:0.5;}
  .day-cell.is-today{border:1px solid var(--accent);}
  .day-cell.is-today .day-name{color:var(--accent);}

  /* Card edit footer */
  .card-edit{padding:10px 16px;border-top:1px solid var(--line);display:flex;gap:6px;flex-wrap:wrap;}
  .card-edit input{flex:1;min-width:70px;background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:5px 8px;border-radius:6px;font-size:11px;outline:none;}
  .card-edit input:focus{border-color:var(--accent);}
  .save-btn{font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;border:1px solid rgba(22,163,74,0.4);background:var(--good-bg);color:var(--good);font-weight:600;}
  .del-btn{font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--line);background:var(--panel-2);color:var(--muted);}

  /* Off members mini list */
  .off-grid{display:flex;flex-wrap:wrap;gap:10px;padding:16px 28px 40px;}
  .off-chip{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 16px;}
  .off-chip .off-name{font-size:14px;font-weight:600;}
  .off-chip .off-shift{font-size:11px;color:var(--muted);}
  .off-badge{background:var(--off-bg);color:var(--off);border:1px solid rgba(107,126,147,0.3);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}

  .empty-state{padding:60px 28px;text-align:center;color:var(--muted);grid-column:1/-1;}
  footer{padding:12px 28px;color:var(--muted);font-size:11px;border-top:1px solid var(--line);}
  #app{display:none;}
</style>
</head>

<div id="loginScreen">
  <div class="login-box">
    <h1>OE Team Dashboard</h1>
    <div class="sub">Sign in to view and edit</div>
    <input id="loginEmail" type="email" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <div id="loginError"></div>
    <button class="sign-in-btn" id="loginBtn">Sign in</button>
  </div>
  <button class="theme-btn" id="themeToggleLogin">🌙 Dark mode</button>
</div>

<div id="app">
  <header>
    <div>
      <h1>OE Team Dashboard</h1>
      <div class="sub">Shift monitoring · Cut-off alerts · Schedule</div>
    </div>
    <div class="right-controls">
      <button class="theme-btn" id="themeToggleApp">🌙 Dark mode</button>
      <span id="statusPill" class="pill">Connecting…</span>
      <button class="icon-btn" id="logoutBtn">Sign out</button>
    </div>
  </header>

  <div class="day-bar">
    <div>
      <div class="today" id="todayLabel"></div>
      <div class="date-sub" id="dateLabel"></div>
    </div>
    <div class="summary-pills" id="summaryPills"></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="today">Today's Shift</div>
    <div class="tab" data-tab="all">All Members</div>
    <div class="tab" data-tab="roster">Weekly Roster</div>
  </div>

  <div class="controls">
    <input id="searchInput" type="text" placeholder="Search by name or supplier...">
    <select id="shiftFilter"><option value="">All shifts</option></select>
    <button class="add-btn" id="addBtn">+ Add member</button>
  </div>

  <div class="grid" id="grid"></div>
  <footer>🟢 Safe &nbsp;·&nbsp; 🟡 Within 1 hour &nbsp;·&nbsp; 🔴 Within 30 mins — time to ping! &nbsp;·&nbsp; Auto-updates every minute.</footer>
</div>

/* ======= THEME ======= */
function applyTheme(dark){
  document.body.classList.toggle('dark',dark);
  const lbl=dark?'☀️ Light mode':'🌙 Dark mode';
  document.getElementById('themeToggleLogin').textContent=lbl;
  document.getElementById('themeToggleApp').textContent=lbl;
  localStorage.setItem('theme',dark?'dark':'light');
}
document.getElementById('themeToggleLogin').onclick=()=>applyTheme(!document.body.classList.contains('dark'));
document.getElementById('themeToggleApp').onclick=()=>applyTheme(!document.body.classList.contains('dark'));
applyTheme(localStorage.getItem('theme')==='dark');

/* ======= AUTH ======= */
function setStatus(t,type){const p=document.getElementById('statusPill');p.textContent=t;p.className='pill'+(type?' '+type:'');}
async function checkSession(){const{data:{session}}=await sb.auth.getSession();session?showApp():showLogin();}
function showLogin(){document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='block';loadAll();subscribeRealtime();}
document.getElementById('loginBtn').onclick=async()=>{
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  const errEl=document.getElementById('loginError');errEl.textContent='';
  const{error}=await sb.auth.signInWithPassword({email,password});
  if(error){errEl.textContent=error.message;return;}showApp();
};
document.getElementById('logoutBtn').onclick=async()=>{await sb.auth.signOut();showLogin();};

/* ======= REALTIME ======= */
function subscribeRealtime(){
  sb.channel('dash').on('postgres_changes',{event:'*',schema:'public',table:'supplier_orders'},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'members'},()=>loadAll()).subscribe();
}

/* ======= DATA ======= */
async function loadAll(){
  setStatus('Loading…');
  const[{data:m,error:e1},{data:o,error:e2}]=await Promise.all([
    sb.from('members').select('*').order('name'),
    sb.from('supplier_orders').select('*')
  ]);
  if(e1||e2){setStatus('Connection error','err');return;}
  members=m||[];orders=o||[];
  setStatus('Live · '+nowAU().toLocaleTimeString('en-AU',{timeZone:'Australia/Sydney'}),'live');
  updateDayBar();populateShiftFilter();render();
}

async function ensureOrderRows(memberId,suppliers){
  const existing=orders.filter(o=>o.member_id===memberId).map(o=>o.supplier_name);
  const missing=suppliers.filter(s=>!existing.includes(s));
  if(!missing.length)return;
  await sb.from('supplier_orders').insert(missing.map(s=>({member_id:memberId,supplier_name:s,unprocessed_count:0})));
}

/* ======= DAY BAR ======= */
function nowAU(){ return new Date(new Date().toLocaleString('en-US',{timeZone:'Australia/Sydney'})); }
function updateDayBar(){
  const now=nowAU();
  const todayIdx=now.getDay();
  const todayName=DAYS[todayIdx];
  const auTimeStr=new Date().toLocaleTimeString('en-AU',{timeZone:'Australia/Sydney',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const auDateStr=new Date().toLocaleDateString('en-AU',{timeZone:'Australia/Sydney',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('todayLabel').textContent=`${todayName}, ${auDateStr}`;
  document.getElementById('dateLabel').textContent=`🇦🇺 AU Sydney Time: ${auTimeStr} — all cut-off times based on AU time`;

  const onShift=Object.entries(ROSTER).filter(([n,d])=>d.schedule[todayName]&&d.schedule[todayName]!=='OFF').length;
  const offToday=Object.entries(ROSTER).filter(([n,d])=>!d.schedule[todayName]||d.schedule[todayName]==='OFF').length;
  let alerts=0,warns=0;
  orders.forEach(o=>{const{status}=getCutoffStatus(o.cutoff_time);if(status==='bad')alerts++;else if(status==='warn')warns++;});

  document.getElementById('summaryPills').innerHTML=`
    <div class="sum-pill on">✅ ${onShift} on shift</div>
    <div class="sum-pill off">😴 ${offToday} off today</div>
    ${warns>0?`<div class="sum-pill warn">🟡 ${warns} near cut-off</div>`:''}
    ${alerts>0?`<div class="sum-pill alert">🔴 ${alerts} urgent!</div>`:''}
  `;
}

/* ======= CUT-OFF ======= */
function getCutoffStatus(cutoffTime){
  if(!cutoffTime)return{status:'none',label:'Set cut-off',icon:'⚪'};
  const now=nowAU();
  const[h,m]=cutoffTime.split(':').map(Number);
  const cutoff=nowAU();cutoff.setHours(h,m,0,0);
  const diff=(cutoff-now)/60000;
  if(diff<0)return{status:'bad',label:'Passed!',icon:'🔴'};
  if(diff<=30)return{status:'bad',label:`${Math.round(diff)}min left`,icon:'🔴'};
  if(diff<=60)return{status:'warn',label:`${Math.round(diff)}min left`,icon:'🟡'};
  const hrs=Math.floor(diff/60),mins=Math.round(diff%60);
  return{status:'ok',label:hrs>0?`${hrs}h ${mins}m left`:`${Math.round(diff)}min left`,icon:'🟢'};
}

function splitList(v){return(v||'').split(';').map(s=>s.trim()).filter(Boolean);}

function populateShiftFilter(){
  const sel=document.getElementById('shiftFilter');const cur=sel.value;
  const shifts=[...new Set(members.map(r=>(r.shift||'').trim()).filter(Boolean))].sort();
  sel.innerHTML='<option value="">All shifts</option>'+shifts.map(s=>`<option value="${s}">${s}</option>`).join('');sel.value=cur;
}

/* ======= TABS ======= */
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');currentTab=t.dataset.tab;render();};
});

/* ======= RENDER ======= */
function render(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const sf=document.getElementById('shiftFilter').value;
  const todayName=DAYS[nowAU().getDay()];

  let filtered=members.filter(m=>{
    const hay=[m.name,m.assigned_suppliers].join(' ').toLowerCase();
    return(!q||hay.includes(q))&&(!sf||(m.shift||'').trim()===sf);
  });

  if(currentTab==='today'){
    filtered=filtered.filter(m=>{
      const roster=ROSTER[m.name];
      return roster&&roster.schedule[todayName]&&roster.schedule[todayName]!=='OFF';
    });
  }

  const grid=document.getElementById('grid');

  if(currentTab==='roster'){
    renderRoster(filtered,todayName,grid);return;
  }

  if(!filtered.length){grid.innerHTML='<div class="empty-state">No members match. Try a different filter or tab.</div>';return;}

  grid.innerHTML=filtered.map(member=>{
    const suppliers=splitList(member.assigned_suppliers);
    ensureOrderRows(member.id,suppliers);
    const roster=ROSTER[member.name];
    const todayShift=roster?roster.schedule[todayName]:'';
    const isOff=!todayShift||todayShift==='OFF';
    const tasks=TASKS[member.name]?TASKS[member.name][todayName]:null;

    const supplierRows=suppliers.map(sup=>{
      const row=orders.find(o=>o.member_id===member.id&&o.supplier_name===sup);
      const cutoff=row?(row.cutoff_time||''):'';
      const{status,label,icon}=getCutoffStatus(cutoff);
      return`<div class="supplier-row ${status==='none'?'':status}">
        <div>
          <div class="sup-name">${sup}</div>
          <div class="cutoff-row"><span class="cutoff-label">Cut-off:</span>
            <input class="cutoff-input" type="time" value="${cutoff}" data-member="${member.id}" data-supplier="${sup}">
          </div>
        </div>
        <div class="time-info"><div class="status-icon">${icon}</div><div class="time-left ${status==='none'?'':status}">${label}</div></div>
      </div>`;
    }).join('');

    const taskRows=tasks?tasks.map(tk=>`
      <div class="task-row ${tk.b?'is-break':''}">
        <span class="task-time">${tk.t}</span>
        <span class="task-name">${tk.s}</span>
      </div>`).join(''):'<div style="color:var(--muted);font-size:12px">No breakdown for today</div>';

    return`<div class="member-card" data-id="${member.id}">
      <div class="card-header">
        <div>
          <div class="name">${member.name}</div>
          ${roster?.role?`<div class="role">${roster.role}</div>`:''}
        </div>
        <div class="${isOff?'shift-chip off-today':'shift-chip on-shift'}">${isOff?'😴 Day Off':todayShift||'On Shift'}</div>
      </div>
      ${suppliers.length?`<div class="card-section"><div class="section-title">Suppliers & Cut-off Times</div>${supplierRows}</div>`:''}
      <div class="card-section"><div class="section-title">Today's Schedule Breakdown</div><div class="task-list">${taskRows}</div></div>
      <div class="card-edit">
        <input class="name-edit" placeholder="Name" value="${member.name||''}">
        <input class="shift-edit" placeholder="Shift" value="${member.shift||''}">
        <input class="suppliers-edit" placeholder="Suppliers (;)" value="${member.assigned_suppliers||''}">
        <button class="save-btn" data-id="${member.id}">Save</button>
        <button class="del-btn" data-id="${member.id}">Delete</button>
      </div>
    </div>`;
  }).join('');

  // Events
  grid.querySelectorAll('.cutoff-input').forEach(i=>i.onchange=()=>updateCutoff(i.dataset.member,i.dataset.supplier,i.value));
  grid.querySelectorAll('.save-btn').forEach(b=>b.onclick=()=>saveMember(b.dataset.id,b.closest('.member-card')));
  grid.querySelectorAll('.del-btn').forEach(b=>b.onclick=()=>deleteMember(b.dataset.id));
}

function renderRoster(filtered,todayName,grid){
  if(!filtered.length){grid.innerHTML='<div class="empty-state">No members to show.</div>';return;}
  grid.innerHTML=filtered.map(member=>{
    const roster=ROSTER[member.name];
    if(!roster)return'';
    const cells=DAYS.map((d,i)=>{
      const shift=roster.schedule[d]||'';
      const isOff=!shift||shift==='OFF';
      const isToday=d===todayName;
      return`<div class="day-cell ${isOff?'is-off':''} ${isToday?'is-today':''}">
        <div class="day-name">${d}</div>
        <div class="day-shift">${isOff?'OFF':shift}</div>
      </div>`;
    }).join('');
    return`<div class="member-card" data-id="${member.id}">
      <div class="card-header">
        <div><div class="name">${member.name}</div>${roster.role?`<div class="role">${roster.role}</div>`:''}</div>
        <div class="${roster.schedule[todayName]&&roster.schedule[todayName]!=='OFF'?'shift-chip on-shift':'shift-chip off-today'}">${roster.schedule[todayName]&&roster.schedule[todayName]!=='OFF'?'✅ On':'😴 Off'}</div>
      </div>
      <div class="card-section"><div class="section-title">Weekly Roster</div><div class="week-grid">${cells}</div></div>
    </div>`;
  }).join('');
}

async function updateCutoff(memberId,supplier,cutoffTime){
  const ex=orders.find(o=>o.member_id===memberId&&o.supplier_name===supplier);
  if(ex)await sb.from('supplier_orders').update({cutoff_time:cutoffTime}).eq('id',ex.id);
  else await sb.from('supplier_orders').insert({member_id:memberId,supplier_name:supplier,cutoff_time:cutoffTime,unprocessed_count:0});
  loadAll();
}
async function saveMember(id,card){
  await sb.from('members').update({name:card.querySelector('.name-edit').value.trim(),shift:card.querySelector('.shift-edit').value.trim(),assigned_suppliers:card.querySelector('.suppliers-edit').value.trim()}).eq('id',id);
  loadAll();
}
async function deleteMember(id){if(!confirm('Remove this member?'))return;await sb.from('members').delete().eq('id',id);loadAll();}
document.getElementById('addBtn').onclick=async()=>{await sb.from('members').insert({name:'New member',shift:'',assigned_suppliers:'',monitored_suppliers:'',notes:''});loadAll();};
document.getElementById('searchInput').addEventListener('input',render);
document.getElementById('shiftFilter').addEventListener('change',render);

checkSession();
setInterval(()=>{updateDayBar();render();},60000);
</script>
